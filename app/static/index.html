<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>b23wrap</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="nav">
    <a class="logo" href="./">b23wrap</a>
    <div class="nav-right">
      <a href="#tool" data-i18n="navTool">工具</a>
      <a id="githubLink" class="nav-github" href="https://github.com/LING71671/b23wrap" target="_blank" rel="noopener">GitHub</a>
      <button type="button" id="langBtn" class="lang-btn" aria-label="language">EN</button>
    </div>
  </nav>

  <section class="hero">
    <div class="watermark" aria-hidden="true"></div>
    <div class="hero-content">
      <h1 data-i18n="heroTitle">网址 → b23.tv</h1>
      <p class="tag" data-i18n="heroTag">简介</p>
    </div>
  </section>

  <main class="main" id="tool">
    <div class="cards">
      <article class="card input-card">
        <h2 data-i18n="genTitle">生成</h2>
        <p class="muted" data-i18n="genDesc">包装网址，签发官方 b23 短链。</p>
        <input id="url" type="url" data-i18n-placeholder="urlPh" placeholder="https://www.example.com" value="https://www.baidu.com" />
        <button id="btn" type="button" data-i18n="genBtn">生成</button>
        <div id="status" class="status" hidden></div>
        <div id="result" class="result" hidden>
          <div class="row">
            <span class="lbl" data-i18n="lblShort">短链</span>
            <a id="short" href="#" target="_blank" rel="noopener"></a>
            <button type="button" class="copy" data-copy="short" data-i18n="copy">复制</button>
          </div>
          <div class="row">
            <span class="lbl" data-i18n="lblLong">长链</span>
            <code id="long"></code>
            <button type="button" class="copy" data-copy="long" data-i18n="copy">复制</button>
          </div>
          <code id="loc" class="loc"></code>
        </div>
      </article>

      <article class="card">
        <h2 data-i18n="appTitle">在 App 内打开</h2>
        <p class="muted" data-i18n="appDesc">仅在 B 站 App 内打开短链，才可能跳到目标站；浏览器一般不会跳转。</p>
      </article>

      <article class="card">
        <h2 data-i18n="disTitle">免责声明</h2>
        <p class="muted" data-i18n="disDesc">非 B 站官方产品。详见 DISCLAIMER.md。许可证 GPL-3.0。</p>
        <p class="repo-line">
          <a id="githubLink2" href="https://github.com/LING71671/b23wrap" target="_blank" rel="noopener">github.com/LING71671/b23wrap</a>
        </p>
      </article>
    </div>
  </main>

  <footer class="footer">
    <a href="https://github.com/LING71671/b23wrap" target="_blank" rel="noopener">GitHub</a>
    <span class="dot">·</span>
    <span data-i18n="footer">b23wrap · 本地 / Pages</span>
  </footer>
  <script src="app.js"></script>
</body>
</html>
