<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>b23wrap</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <nav class="nav">
    <a class="logo" href="/">b23wrap</a>
    <div class="nav-right">
      <a href="#tool">Tool</a>
      <a href="https://github.com/" id="repo" hidden>GitHub</a>
      <span class="lang">GPL-3.0</span>
    </div>
  </nav>

  <section class="hero">
    <div class="watermark" aria-hidden="true"></div>
    <div class="hero-content">
      <h1>URL → b23.tv</h1>
      <p class="tag">ABOUT</p>
    </div>
  </section>

  <main class="main" id="tool">
    <div class="cards">
      <article class="card input-card">
        <h2>Generate</h2>
        <p class="muted">Wrap a URL, mint official b23.</p>
        <input id="url" type="url" placeholder="https://www.example.com" value="https://www.baidu.com" />
        <button id="btn" type="button">Generate</button>
        <div id="status" class="status" hidden></div>
        <div id="result" class="result" hidden>
          <div class="row">
            <span class="lbl">b23</span>
            <a id="short" href="#" target="_blank" rel="noopener"></a>
            <button type="button" class="copy" data-copy="short">Copy</button>
          </div>
          <div class="row">
            <span class="lbl">long</span>
            <code id="long"></code>
            <button type="button" class="copy" data-copy="long">Copy</button>
          </div>
          <code id="loc" class="loc"></code>
        </div>
      </article>

      <article class="card">
        <h2>Open in App</h2>
        <p class="muted">Target opens only inside Bilibili app. Browser stays on official pages.</p>
      </article>

      <article class="card">
        <h2>Disclaimer</h2>
        <p class="muted">Not affiliated with Bilibili. See DISCLAIMER.md. GPL-3.0.</p>
      </article>
    </div>
  </main>

  <footer class="footer">b23wrap · local · 127.0.0.1:8765</footer>
  <script src="/static/app.js"></script>
</body>
</html>
