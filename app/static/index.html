<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>b23wrap</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="nav">
    <a class="logo" href="./">b23wrap</a>
    <div class="nav-right">
      <a href="#tool" data-i18n="navTool">工具</a>
      <a id="githubLink" class="nav-github" href="https://github.com/LING71671/b23wrap" target="_blank" rel="noopener">GitHub</a>
      <button type="button" id="langBtn" class="lang-btn" aria-label="language">EN</button>
    </div>
  </nav>

  <section class="hero">
    <div class="watermark" aria-hidden="true"></div>
    <div class="hero-content">
      <h1 data-i18n="heroTitle">网址 → b23.tv</h1>
      <p class="tag" data-i18n="heroTag">简介</p>
    </div>
  </section>

  <main class="main" id="tool">
    <div class="cards">
      <article class="card input-card">
        <h2 data-i18n="genTitle">生成</h2>
        <p class="muted" data-i18n="genDesc">包装网址，签发官方 b23 短链。</p>
        <input id="url" type="url" data-i18n-placeholder="urlPh" placeholder="https://www.example.com" value="" />
        <button id="btn" type="button" data-i18n="genBtn">生成</button>
        <div id="status" class="status" hidden></div>
        <div id="result" class="result" hidden>
          <div class="row">
            <span class="lbl" data-i18n="lblShort">短链</span>
            <a id="short" href="#" target="_blank" rel="noopener"></a>
            <button type="button" class="copy" data-copy="short" data-i18n="copy">复制</button>
          </div>
          <div class="row">
            <span class="lbl" data-i18n="lblLong">长链</span>
            <code id="long"></code>
            <button type="button" class="copy" data-copy="long" data-i18n="copy">复制</button>
          </div>
          <code id="loc" class="loc"></code>
        </div>
      </article>

      <article class="card">
        <h2 data-i18n="appTitle">在 App 内打开</h2>
        <p class="muted" data-i18n="appDesc">仅在 B 站 App 内打开短链，才可能跳到目标站；浏览器一般不会跳转。</p>
      </article>

      <article class="card">
        <h2 data-i18n="disTitle">免责声明</h2>
        <p class="muted" data-i18n="disDesc">非 B 站官方产品。详见 DISCLAIMER.md。许可证 GPL-3.0。</p>
        <p class="repo-line">
          <a id="githubLink2" class="repo-link" href="https://github.com/LING71671/b23wrap" target="_blank" rel="noopener">
            <svg class="gh-icon" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
              <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8"/>
            </svg>
            <span>github.com/LING71671/b23wrap</span>
          </a>
        </p>
      </article>
    </div>
  </main>

  <footer class="footer">
    <a href="https://github.com/LING71671/b23wrap" target="_blank" rel="noopener">GitHub</a>
    <span class="dot">·</span>
    <span data-i18n="footer">b23wrap · 本地 / Pages</span>
  </footer>
  <script src="app.js"></script>
</body>
</html>
