name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare site
        run: |
          mkdir -p _site
          cp app/static/index.html app/static/style.css app/static/app.js _site/
          cp app/static/favicon.ico app/static/favicon.png \
             app/static/favicon-16.png app/static/favicon-32.png \
             app/static/favicon-192.png app/static/favicon-512.png _site/ 2>/dev/null || true
          cp DISCLAIMER.md LICENSE README.md _site/ 2>/dev/null || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
